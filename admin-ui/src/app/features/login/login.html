<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">

    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow w-80">

        <h2 class="text-xl font-semibold mb-4 text-center">
            Login
        </h2>

        <div class="space-y-3">

            <input type="email" placeholder="Email" [(ngModel)]="email" class="w-full border p-2 rounded" />

            <input type="password" placeholder="Password" [(ngModel)]="password" class="w-full border p-2 rounded" />

            <button (click)="login()" [disabled]="isLoading$ | async" class="bg-blue-500 text-white px-4 py-2 rounded">
                @if (isLoading$ | async) {
                Logging in...
                } @else {
                Login
                }
            </button>

        </div>

    </div>

</div>
