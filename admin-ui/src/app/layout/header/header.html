<header class="bg-white shadow p-4 flex justify-between">

  <button (click)="toggleMobileSidebar.emit()" class="text-xl md:hidden">
    ☰
  </button>

  <h1 class="text-lg font-semibold">

  </h1>


  <div class="flex gap-4 items-center">

    🔔
    👤

</header>
