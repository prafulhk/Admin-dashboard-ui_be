<div class="flex w-full min-h-screen">
  @if (isMobileSidebarOpen) {
    <div (click)="closeMobileSidebar()"
      class="fixed inset-0 bg-black bg-opacity-40 z-30 md:hidden">
    </div>
  }

  <app-sidebar [isMobileOpen]="isMobileSidebarOpen">
  </app-sidebar>

  <div class="flex-1 flex flex-col transition-all duration-300" [ngClass]="{
         'md:ml-64': isOpen,
         'md:ml-16': !isOpen
       }">

    <app-header (toggleMobileSidebar)="toggleMobileSidebar()">
    </app-header>

    <main class="p-4 md:p-6 w-full dark:bg-gray-900">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
